version: "3.8"

services:
  redis:
    image: redis:7-alpine
    container_name: bbtrs-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    restart: unless-stopped

volumes:
  redis_data:
