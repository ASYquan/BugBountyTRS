    severity: high
    category: siem
    tags: [siem, splunk, dashboard]

  - name: "Splunk (Favicon)"
    query: 'http.favicon.hash:-316785925 hostname:"{domain}"'
    severity: high
    category: siem
    tags: [siem, splunk, favicon]

  # ═══════════════════════════════════════════════════════════════════
  # Legacy / Protocols
  # ═══════════════════════════════════════════════════════════════════

  - name: "FTP Unusual Port"
    query: 'ftp port:"10000" hostname:"{domain}"'
    severity: medium
    category: legacy
    tags: [legacy, ftp, unusual_port]

  - name: "FTP Login Successful"
    query: '"220" "230 Login successful." port:21 hostname:"{domain}"'
    severity: high
    category: legacy
    tags: [legacy, ftp, anonymous]

  - name: "SMB No Auth"
    query: '"Authentication: disabled" port:445 product:"Samba" hostname:"{domain}"'
