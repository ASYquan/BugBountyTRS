# Shodan Signatures — KarmaV2-style configurable dork system
#
# Each signature defines a Shodan query template and optional filters.
# {domain} is replaced with the target domain at runtime.
#
# Fields:
#   name:       Human-readable signature name
#   query:      Shodan search query ({domain} is interpolated)
#   severity:   Finding severity (info, low, medium, high, critical)
#   category:   Grouping tag
#   tags:       List of tags for filtering/selection
#   enabled:    true/false (default: true)
#   filters:    Optional filtering rules applied to results
#     include_headers:    Only keep results with these HTTP headers
#     exclude_headers:    Drop results with these HTTP headers
#     include_title:      Only keep results whose title contains these strings
#     exclude_title:      Drop results whose title contains these strings
#     include_products:   Only keep results matching these product strings
#     exclude_products:   Drop results matching these product strings
#     include_ports:      Only keep results on these ports
#     exclude_ports:      Drop results on these ports
#     cdn_exclude:        Drop CDN/WAF IPs (uses built-in CDN detection)
#     min_port_count:     Only keep hosts with at least N open ports

# ═══════════════════════════════════════════════════════════════════
# SSL / Certificate Discovery
# ═══════════════════════════════════════════════════════════════════

signatures:

  # --- SSL/Certificate Hunting ---

  - name: "SSL Certificate (CN)"
    query: 'ssl.cert.subject.cn:"{domain}"'
    severity: info
    category: ssl
    tags: [ssl, certificate, discovery]

  - name: "SSL Certificate (SAN)"
    query: 'ssl:"{domain}"'
    severity: info
    category: ssl
    tags: [ssl, certificate, discovery]

  - name: "SSL Certificate (Issuer CN)"
    query: 'ssl.cert.issuer.cn:"{domain}"'
    severity: info
    category: ssl
    tags: [ssl, certificate, discovery]

  - name: "SSL Subject CommonName Wildcard"
    query: 'ssl.cert.subject.commonName:"*.{domain}"'
    severity: info
    category: ssl
    tags: [ssl, wildcard, discovery]

  - name: "SSL Expired Certificates"
    query: 'ssl.cert.expired:true hostname:"*.{domain}"'
    severity: medium
    category: ssl
    tags: [ssl, expired, misconfiguration]

  - name: "Self-Signed Certificates"
    query: 'ssl.cert.issuer.cn:"{domain}" ssl.cert.subject.cn:"{domain}"'
    severity: medium
    category: ssl
    tags: [ssl, self_signed, misconfiguration]

  # --- CDN/WAF Bypass (Real IP Discovery) ---

  - name: "CDN Bypass — No Cloudflare"
    query: 'ssl:"{domain}" -"Cloudflare"'
    severity: medium
    category: cdn_bypass
    tags: [cdn_bypass, infrastructure, cloudflare]
    filters:
      cdn_exclude: true

  - name: "CDN Bypass — No Cloudfront"
    query: 'ssl:"{domain}" -"Cloudfront"'
    severity: medium
    category: cdn_bypass
    tags: [cdn_bypass, infrastructure, cloudfront]
    filters:
      cdn_exclude: true

  - name: "CDN Bypass — No Akamai"
    query: 'ssl:"{domain}" -"AkamaiGHost" -"GHost"'
    severity: medium
    category: cdn_bypass
    tags: [cdn_bypass, infrastructure, akamai]
    filters:
      cdn_exclude: true

  - name: "CDN Bypass — All Major CDNs Excluded"
    query: 'ssl:"{domain}" -"Cloudflare" -"Cloudfront" -"AkamaiGHost" -"Incapsula" -"Sucuri"'
    severity: high
    category: cdn_bypass
    tags: [cdn_bypass, infrastructure, real_ip]
    filters:
      cdn_exclude: true

  # --- Organization / Hostname Discovery ---

  - name: "Hostname Search"
    query: 'hostname:"{domain}"'
    severity: info
    category: discovery
    tags: [discovery, hostname]

  - name: "Organization Search"
    query: 'org:"{domain_org}"'
    severity: info
    category: discovery
    tags: [discovery, organization]

  # --- VPN / Remote Access ---

  - name: "VPN Infrastructure"
    query: 'ssl.cert.subject.cn:*vpn* ssl.cert.subject.cn:"{domain}"'
    severity: medium
    category: vpn
    tags: [vpn, remote_access, infrastructure]

  - name: "Citrix Gateway"
    query: 'http.title:"Citrix Gateway" hostname:"{domain}"'
    severity: medium
    category: vpn
    tags: [vpn, citrix, remote_access]

  - name: "Fortinet VPN"
    query: 'http.title:"Fortinet" hostname:"{domain}"'
    severity: medium
    category: vpn
    tags: [vpn, fortinet, remote_access]

  - name: "OpenVPN"
    query: 'http.title:"OpenVPN" hostname:"{domain}"'
    severity: medium
    category: vpn
    tags: [vpn, openvpn]

  - name: "PulseSecure / Ivanti"
    query: 'http.html:"PulseSecure" hostname:"{domain}"'
    severity: medium
    category: vpn
    tags: [vpn, pulse_secure, ivanti]

  # ═══════════════════════════════════════════════════════════════════
  # Auth / SSO / OAuth
  # ═══════════════════════════════════════════════════════════════════

  - name: "OAuth Redirect"
    query: 'http.status:"302" "oauth" hostname:"{domain}"'
    severity: info
    category: auth
    tags: [auth, oauth, redirect]

  - name: "SSO Redirect"
    query: 'http.status:"302" "sso" hostname:"{domain}"'
    severity: info
    category: auth
    tags: [auth, sso, redirect]

  - name: "401 Authorization Required"
    query: 'http.title:"401 Authorization Required" hostname:"{domain}"'
    severity: info
    category: auth
    tags: [auth, unauthorized]

  - name: "HTTP Basic Auth"
    query: '"WWW-Authenticate: Basic" hostname:"{domain}"'
    severity: low
    category: auth
    tags: [auth, basic_auth]

  # ═══════════════════════════════════════════════════════════════════
  # CI/CD & DevOps
  # ═══════════════════════════════════════════════════════════════════

  - name: "Jenkins"
    query: '"X-Jenkins" "Set-Cookie: JSESSIONID" hostname:"{domain}"'
    severity: high
    category: ci_cd
    tags: [ci_cd, jenkins, dashboard]
